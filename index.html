<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partner Blueprint — a compatibility engine</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 34 34'><circle cx='17' cy='17' r='15' fill='none' stroke='%23C9A35C' stroke-width='2'/><circle cx='17' cy='17' r='3' fill='%23C9A35C'/></svg>">
<style>
  :root{
    --bg:#11151C;
    --bg-grid: rgba(201,163,92,0.045);
    --panel:#1B212C;
    --panel-2:#222A38;
    --panel-line: rgba(201,163,92,0.16);
    --gold:#C9A35C;
    --gold-dim:#8A7242;
    --teal:#5FA8A0;
    --teal-dim:#3E726C;
    --rust:#B5564A;
    --text:#EDE7DA;
    --text-muted:#8B93A1;
    --font-display: ui-serif, Georgia, "Times New Roman", serif;
    --font-body: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, "Courier New", monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      linear-gradient(var(--bg-grid) 1px, transparent 1px) 0 0/32px 32px,
      linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px) 0 0/32px 32px,
      var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  #app{ max-width:940px; margin:0 auto; padding:40px 24px 96px; }
  a{color:var(--gold);}

  /* ---------- header / masthead ---------- */
  .masthead{ display:flex; align-items:center; gap:16px; margin-bottom:36px; padding-bottom:20px; border-bottom:1px solid var(--panel-line); }
  .masthead .mark{flex:0 0 auto;}
  .masthead h1{ font-family:var(--font-display); font-weight:600; font-size:1.5rem; letter-spacing:0.01em; margin:0; color:var(--text); }
  .masthead .sub{ font-family:var(--font-mono); font-size:0.72rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-muted); margin-top:4px; }
  .lock-pill{margin-left:auto; font-family:var(--font-mono); font-size:0.62rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--teal); border:1px solid var(--teal-dim); border-radius:20px; padding:4px 10px;}

  /* ---------- generic panel ---------- */
  .panel{ background:var(--panel); border:1px solid var(--panel-line); border-radius:3px; padding:32px; position:relative; }
  .panel + .panel{margin-top:20px;}
  .eyebrow{ font-family:var(--font-mono); font-size:0.7rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--gold); margin:0 0 10px; }

  /* ---------- intro ---------- */
  .intro h2{ font-family:var(--font-display); font-size:1.9rem; line-height:1.25; margin:0 0 16px; max-width:32ch; }
  .intro p{ color:var(--text-muted); line-height:1.65; max-width:64ch; margin:0 0 14px; font-size:0.97rem; }
  .intro ul{margin:18px 0; padding-left:0; list-style:none;}
  .intro li{ display:flex; gap:12px; padding:10px 0; border-top:1px solid var(--panel-line); color:var(--text-muted); font-size:0.92rem; line-height:1.5; }
  .intro li:last-child{border-bottom:1px solid var(--panel-line);}
  .intro li .num{font-family:var(--font-mono); color:var(--gold); flex:0 0 28px;}

  /* ---------- buttons ---------- */
  .btn{ font-family:var(--font-mono); font-size:0.78rem; letter-spacing:0.06em; text-transform:uppercase; background:transparent; color:var(--gold); border:1px solid var(--gold-dim); padding:12px 22px; border-radius:2px; cursor:pointer; transition:background 0.15s ease, color 0.15s ease, border-color .15s ease; }
  .btn:hover{background:rgba(201,163,92,0.1); border-color:var(--gold);}
  .btn:focus-visible{outline:2px solid var(--gold); outline-offset:2px;}
  .btn.primary{background:var(--gold); color:#1B1404; border-color:var(--gold); font-weight:600;}
  .btn.primary:hover{background:#dcb46c;}
  .btn.ghost{border-color:transparent; color:var(--text-muted);}
  .btn.ghost:hover{color:var(--text); background:rgba(255,255,255,0.04);}
  .btn:disabled{opacity:0.35; cursor:not-allowed;}
  .btn-row{display:flex; gap:12px; align-items:center; margin-top:28px; flex-wrap:wrap;}
  .btn.sm{padding:8px 14px; font-size:0.7rem;}

  /* ---------- progress rail ---------- */
  .rail{ display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
  .rail .seg{ flex:1 1 0; min-width:14px; height:4px; background:var(--panel-2); border-radius:2px; overflow:hidden; }
  .rail .seg i{display:block; height:100%; transition:width .15s ease;}
  .rail-label{ font-family:var(--font-mono); font-size:0.7rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted); margin-bottom:10px; }

  /* ---------- question / items ---------- */
  .q-cat{ font-family:var(--font-mono); font-size:0.7rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--teal); margin:0 0 14px; }
  .q-text{ font-family:var(--font-display); font-size:1.25rem; line-height:1.4; margin:0 0 6px; max-width:52ch; }
  .item{border-top:1px solid var(--panel-line); padding:22px 0;}
  .item:first-of-type{border-top:none;}
  .sub-label{font-family:var(--font-mono); font-size:0.64rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted); margin:16px 0 8px;}
  .opts{display:flex; flex-wrap:wrap; gap:8px;}
  .opts button{ padding:10px 14px; background:var(--panel-2); border:1px solid var(--panel-line); border-radius:2px; color:var(--text-muted); font-family:var(--font-body); font-size:0.86rem; cursor:pointer; transition:all .12s ease; }
  .opts button:hover{border-color:var(--gold-dim); color:var(--text);}
  .opts button.sel{background:rgba(201,163,92,0.14); border-color:var(--gold); color:var(--gold); font-weight:600;}
  .opts.accept button.sel{background:rgba(95,168,160,0.14); border-color:var(--teal); color:var(--teal);}
  .imp{display:flex; gap:6px; flex-wrap:wrap;}
  .imp button{flex:1 1 auto; padding:8px 6px; background:var(--panel-2); border:1px solid var(--panel-line); border-radius:2px; color:var(--text-muted); font-family:var(--font-mono); font-size:0.66rem; text-transform:uppercase; letter-spacing:0.04em; cursor:pointer;}
  .imp button.sel{background:rgba(201,163,92,0.14); border-color:var(--gold); color:var(--gold);}

  .likert-row{display:flex; align-items:center; gap:14px; padding:14px 0; border-top:1px solid var(--panel-line);}
  .likert-row:first-of-type{border-top:none;}
  .likert-row .lk-text{flex:1; font-size:0.95rem; line-height:1.4;}
  .likert{display:flex; gap:5px;}
  .likert button{width:34px; height:34px; background:var(--panel-2); border:1px solid var(--panel-line); border-radius:50%; color:var(--text-muted); font-family:var(--font-mono); font-size:0.72rem; cursor:pointer;}
  .likert button.sel{background:var(--gold); border-color:var(--gold); color:#1B1404; font-weight:700;}
  .likert-ends{display:flex; justify-content:space-between; font-size:0.72rem; color:var(--text-muted); margin:2px 0 18px;}

  .scale{ display:flex; gap:10px; margin-bottom:6px; }
  .scale button{ flex:1; padding:16px 8px; background:var(--panel-2); border:1px solid var(--panel-line); border-radius:2px; color:var(--text-muted); font-family:var(--font-mono); font-size:0.78rem; cursor:pointer; text-align:center; transition:all .12s ease; }
  .scale button:hover{border-color:var(--gold-dim); color:var(--text);}
  .scale button.sel{ background:rgba(201,163,92,0.14); border-color:var(--gold); color:var(--gold); font-weight:600; }
  .scale-labels{ display:flex; justify-content:space-between; font-size:0.74rem; color:var(--text-muted); margin-bottom:24px; }

  .check-list{display:flex; flex-direction:column; gap:10px;}
  .check-list label{ display:flex; align-items:flex-start; gap:12px; padding:14px 18px; background:var(--panel-2); border:1px solid var(--panel-line); border-radius:2px; cursor:pointer; font-size:0.92rem; }
  .check-list input{margin-top:3px; accent-color:var(--gold);}
  .text-input{ width:100%; background:var(--panel-2); border:1px solid var(--panel-line); border-radius:2px; color:var(--text); font-family:var(--font-body); font-size:0.92rem; padding:12px 14px; margin-top:4px; }
  .hint{color:var(--text-muted); font-size:0.82rem; line-height:1.5;}
  .db-row{display:flex; align-items:center; gap:12px; padding:16px 0; border-top:1px solid var(--panel-line); flex-wrap:wrap;}
  .db-row:first-of-type{border-top:none;}
  .db-row .db-q{flex:1 1 220px; font-size:0.95rem;}
  .nn-toggle{display:flex; align-items:center; gap:7px; font-family:var(--font-mono); font-size:0.64rem; text-transform:uppercase; letter-spacing:0.06em; color:var(--rust); cursor:pointer;}
  .nn-toggle input{accent-color:var(--rust);}

  /* ---------- results ---------- */
  .results-grid{ display:grid; grid-template-columns: 1fr 1fr; gap:20px; }
  @media (max-width:760px){ .results-grid{grid-template-columns:1fr;} }
  .chart-wrap{display:flex; align-items:center; justify-content:center;}
  .legend{display:flex; flex-wrap:wrap; gap:14px; margin-top:18px; justify-content:center;}
  .legend-item{display:flex; align-items:center; gap:8px; font-family:var(--font-mono); font-size:0.72rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.06em;}
  .swatch{width:11px; height:11px; border-radius:50%; display:inline-block;}
  .profile-text{ font-family:var(--font-display); font-size:1.05rem; line-height:1.75; color:var(--text); }
  .profile-text strong{color:var(--gold); font-weight:600;}
  .profile-text p{margin:0 0 14px;}

  table.breakdown{width:100%; border-collapse:collapse; margin-top:6px;}
  table.breakdown th{ text-align:left; font-family:var(--font-mono); font-size:0.68rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-muted); padding:8px 10px; border-bottom:1px solid var(--panel-line); }
  table.breakdown td{padding:10px 10px; border-bottom:1px solid var(--panel-line); font-size:0.88rem; vertical-align:middle;}
  table.breakdown tr:last-child td{border-bottom:none;}
  .bar-track{background:var(--panel-2); border-radius:2px; height:8px; width:100%; overflow:hidden;}
  .bar-fill{height:100%; background:var(--gold);}
  .bar-fill.cand{background:var(--teal);}

  .tag{ display:inline-block; font-family:var(--font-mono); font-size:0.68rem; letter-spacing:0.06em; text-transform:uppercase; border:1px solid var(--gold-dim); color:var(--gold); padding:3px 8px; border-radius:2px; margin:2px 6px 2px 0; }
  .tag.rust{border-color:var(--rust); color:var(--rust);}
  .tag.teal{border-color:var(--teal-dim); color:var(--teal);}

  .warn-banner{ border:1px solid var(--rust); background:rgba(181,86,74,0.12); color:#e7a59c; padding:16px 20px; border-radius:3px; font-size:0.9rem; margin:18px 0; line-height:1.55; }
  .warn-banner strong{color:var(--rust);}
  .note-banner{ border:1px solid var(--gold-dim); background:rgba(201,163,92,0.08); color:var(--text-muted); padding:14px 18px; border-radius:3px; font-size:0.85rem; margin:16px 0; line-height:1.55; }

  .candidate-card{ border:1px solid var(--panel-line); border-radius:3px; padding:22px 24px; margin-top:16px; background:var(--panel-2); }
  .rank-list{display:flex; flex-direction:column; gap:10px; margin-top:10px;}
  .rank-row{ display:flex; align-items:center; gap:14px; padding:12px 16px; background:var(--panel-2); border:1px solid var(--panel-line); border-radius:2px; }
  .rank-row.excluded{opacity:0.7; border-color:var(--rust);}
  .rank-row .pos{font-family:var(--font-mono); color:var(--gold); font-size:0.85rem; width:22px;}
  .rank-row .name{flex:1; font-size:0.92rem;}
  .rank-row .score{font-family:var(--font-mono); color:var(--teal); font-size:0.92rem;}

  .stat-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-top:16px;}
  .stat{background:var(--panel-2); border:1px solid var(--panel-line); border-radius:3px; padding:16px;}
  .stat .k{font-family:var(--font-mono); font-size:0.62rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-muted);}
  .stat .v{font-family:var(--font-display); font-size:1.5rem; color:var(--gold); margin-top:6px;}
  .stat .v.teal{color:var(--teal);}

  .empty-state{ text-align:center; padding:40px 20px; color:var(--text-muted); }
  .empty-state p{max-width:44ch; margin:8px auto 0; line-height:1.6; font-size:0.9rem;}
  .choice-cards{display:grid; grid-template-columns:1fr; gap:12px; margin-top:8px;}
  .choice-card{text-align:left; padding:18px 20px; background:var(--panel-2); border:1px solid var(--panel-line); border-radius:3px; cursor:pointer;}
  .choice-card:hover{border-color:var(--gold-dim);}
  .choice-card h4{margin:0 0 6px; font-family:var(--font-display); font-size:1.05rem; color:var(--text);}
  .choice-card p{margin:0; color:var(--text-muted); font-size:0.85rem; line-height:1.5;}

  footer{ text-align:center; margin-top:50px; color:var(--text-muted); font-family:var(--font-mono); font-size:0.7rem; letter-spacing:0.06em; line-height:1.7;}
  .toolbar{display:flex; gap:8px; justify-content:flex-end; margin-bottom:18px; flex-wrap:wrap;}
  .section-title{font-family:var(--font-display); font-size:1.3rem; margin:0 0 6px;}
  .section-desc{color:var(--text-muted); font-size:0.88rem; margin:0 0 22px; max-width:60ch; line-height:1.55;}
  input[type=file]{display:none;}
  .slider{width:100%; accent-color:var(--teal);}
</style>
</head>
<body>
<div id="app"></div>
<input type="file" id="importFile" accept="application/json">
<script>
/* ============================================================================
   PARTNER BLUEPRINT — high-precision romantic compatibility engine
   Single-file, zero-dependency, client-side SPA. Works on GitHub Pages & file://
   ---------------------------------------------------------------------------
   TABLE OF CONTENTS
     [CONST]      categories, axes, importance weights
     [INSTRUMENTS] reciprocal item bank, TIPI, ECR-S, Gottman, dealbreakers, checkup
     [ENGINE]     psychometric derivation + Tier1 gate / Tier2 reciprocal / Tier3 TOPSIS
     [PROFILE]    empty profile, category/axis scoring, narrative text
     [CHARTS]     radar (compass), attachment quadrant, sparkline
     [CRYPTO]     PBKDF2 + AES-GCM (Web Crypto)
     [STORE]      IndexedDB persistence
     [STATE]      app state
     [RENDER]     views
     [EXPORT]     JSON export/import + v1→v2 migration
     [EVENTS]     delegation + input binding
     [BOOT]       init, hydrate, #selftest
   ========================================================================== */

/* ============================== [CONST] ================================== */

const SCHEMA_VERSION = 2;

const IMPORTANCE_WEIGHTS = { irrelevant:0, little:1, somewhat:10, very:50, mandatory:250 };
const IMPORTANCE_ORDER = ['irrelevant','little','somewhat','very','mandatory'];
const IMPORTANCE_LABEL = { irrelevant:'Irrelevant', little:'A little', somewhat:'Somewhat', very:'Very', mandatory:'Mandatory' };

// Who the user is looking for — drives all portrait copy. Configurable in settings.
const SEEKING = {
  woman:  { noun:'woman',   subj:'she',  subjCap:'She',  pos:'her',   posCap:'Her'  },
  man:    { noun:'man',     subj:'he',   subjCap:'He',   pos:'his',   posCap:'His'  },
  person: { noun:'partner', subj:'they', subjCap:'They', pos:'their', posCap:'Their'},
};
function seekOf(p){ return SEEKING[(p && p.seeking) || 'woman'] || SEEKING.woman; }

// Reciprocal preference categories (also the first 6 compass axes)
const RECIP_CATS = [
  {id:'values',        label:'Core Values',        short:'Values'},
  {id:'communication', label:'Communication',      short:'Comm'},
  {id:'affection',     label:'Affection',          short:'Affection'},
  {id:'lifestyle',     label:'Lifestyle',          short:'Lifestyle'},
  {id:'meaning',       label:'Shared Meaning',     short:'Meaning'},
  {id:'finance',       label:'Finances',           short:'Finance'},
];
// Full 8-axis Joint Compass = reciprocal cats + two psychometric axes
const COMPASS_AXES = [
  ...RECIP_CATS.map(c=>({id:c.id, short:c.short})),
  {id:'personality', short:'Traits'},
  {id:'attachment',  short:'Security'},
];

/* ============================ [INSTRUMENTS] ============================== */

// Reciprocal items: respondent gives own `answer`, acceptable partner answers `preferred`, and `importance`.
const RECIP_ITEMS = [
  // --- values ---
  {id:'val_family', cat:'values', text:'A close, involved family life together is…',
   options:[[1,'Not a priority'],[2,'Nice to have'],[3,'Important'],[4,'Essential']]},
  {id:'val_ambition', cat:'values', text:'Pursuing ambitious career or professional goals is…',
   options:[[1,'Not important'],[2,'Somewhat'],[3,'Important'],[4,'Essential']]},
  {id:'val_faith', cat:'values', text:'The role of spirituality or religion in life:',
   options:[[1,'None'],[2,'Private & personal'],[3,'Shared & important'],[4,'Central to everything']]},
  {id:'val_growth', cat:'values', text:'Ongoing personal growth, learning, and depth is…',
   options:[[1,'Low priority'],[2,'Somewhat'],[3,'Important'],[4,'Essential']]},
  // --- communication ---
  {id:'comm_style', cat:'communication', text:'My preferred communication style is…',
   options:[[1,'Very direct & blunt'],[2,'Direct but tactful'],[3,'Diplomatic'],[4,'Gentle & indirect']]},
  {id:'comm_conflict', cat:'communication', text:'When something is wrong, I prefer to…',
   options:[[1,'Address it right away'],[2,'Cool off briefly, then talk'],[3,'Take real space first'],[4,'Let most things go']]},
  {id:'comm_depth', cat:'communication', text:'Deep, reflective conversation is…',
   options:[[1,'Rarely needed'],[2,'Occasional'],[3,'Important'],[4,'Essential']]},
  // --- affection ---
  {id:'aff_language', cat:'affection', text:'What makes me feel most loved:',
   options:[[1,'Words of affirmation'],[2,'Quality time'],[3,'Acts of service'],[4,'Gifts'],[5,'Physical touch']]},
  {id:'aff_touch', cat:'affection', text:'Physical affection and touch are…',
   options:[[1,'Low priority'],[2,'Somewhat'],[3,'Important'],[4,'Essential']]},
  // --- lifestyle ---
  {id:'life_social', cat:'lifestyle', text:'My social energy:',
   options:[[1,'Very outgoing'],[2,'Balanced'],[3,'Mostly low-key'],[4,'Strongly prefer quiet']]},
  {id:'life_routine', cat:'lifestyle', text:'Routine vs spontaneity:',
   options:[[1,'Highly structured'],[2,'Somewhat structured'],[3,'Flexible'],[4,'Very spontaneous']]},
  {id:'life_substance', cat:'lifestyle', text:'My attitude toward alcohol:',
   options:[[1,"Don't drink"],[2,'Rarely'],[3,'Socially'],[4,'Regularly']]},
  {id:'life_health', cat:'lifestyle', text:'Fitness and health-conscious habits are…',
   options:[[1,'Low priority'],[2,'Somewhat'],[3,'Important'],[4,'Essential']]},
  // --- shared meaning (M4) ---
  {id:'mean_reunions', cat:'meaning', text:'Daily rituals of reconnection (check-ins, unwinding together) are…',
   options:[[1,'Not needed'],[2,'Nice'],[3,'Important'],[4,'Essential']]},
  {id:'mean_goals', cat:'meaning', text:'Sharing long-term goals (travel, milestones, retirement):',
   options:[[1,'We can differ'],[2,'Somewhat aligned'],[3,'Important'],[4,'Must be aligned']]},
  {id:'mean_roles', cat:'meaning', text:'Views on life roles and division of labor:',
   options:[[1,'Traditional'],[2,'Somewhat traditional'],[3,'Egalitarian'],[4,'Fully flexible']]},
  {id:'mean_commitment', cat:'meaning', text:'What commitment / marriage means to me:',
   options:[[1,'Sacred & lifelong'],[2,'A serious commitment'],[3,'A partnership that can evolve'],[4,'Independence within togetherness']]},
  // --- finances (M5) ---
  {id:'fin_debt', cat:'finance', text:'My attitude toward debt:',
   options:[[1,'Debt-averse'],[2,'Cautious'],[3,'Pragmatic (strategic debt ok)'],[4,'Comfortable with balances']]},
  {id:'fin_accounts', cat:'finance', text:'Combining finances:',
   options:[[1,'Fully joint'],[2,'Mostly joint'],[3,'Mostly separate'],[4,'Fully separate']]},
  {id:'fin_disclose', cat:'finance', text:'Purchases above this amount should be discussed first:',
   options:[[1,'$50'],[2,'$200'],[3,'$500'],[4,'$1,000+']]},
  {id:'fin_fidelity', cat:'finance', text:'Hiding a purchase or debt from a partner is:',
   options:[[1,'Never ok'],[2,'Rarely ok'],[3,'Sometimes ok'],[4,'Not a big deal']]},
  {id:'fin_support', cat:'finance', text:'Financially supporting extended family:',
   options:[[1,'An important duty'],[2,'If truly needed'],[3,'Prefer not to'],[4,"Won't"]]},
];
const RECIP_BY_CAT = {};
RECIP_CATS.forEach(c => RECIP_BY_CAT[c.id] = RECIP_ITEMS.filter(i=>i.cat===c.id));
function recipMax(item){ return Math.max(...item.options.map(o=>o[0])); }

// TIPI (Gosling et al., 2003). "I see myself as:" 1..7 (Disagree strongly → Agree strongly)
const TIPI_ITEMS = [
  {id:'tipi1',  text:'Extraverted, enthusiastic'},
  {id:'tipi2',  text:'Critical, quarrelsome'},
  {id:'tipi3',  text:'Dependable, self-disciplined'},
  {id:'tipi4',  text:'Anxious, easily upset'},
  {id:'tipi5',  text:'Open to new experiences, complex'},
  {id:'tipi6',  text:'Reserved, quiet'},
  {id:'tipi7',  text:'Sympathetic, warm'},
  {id:'tipi8',  text:'Disorganized, careless'},
  {id:'tipi9',  text:'Calm, emotionally stable'},
  {id:'tipi10', text:'Conventional, uncreative'},
];
// ECR-S (Wei et al., 2007). 1..7 (Disagree strongly → Agree strongly)
const ECR_ITEMS = [
  {id:'ecr1',  text:'It helps to turn to my romantic partner in times of need.'},
  {id:'ecr2',  text:'I need a lot of reassurance that I am loved by my partner.'},
  {id:'ecr3',  text:'I want to get close to my partner, but I keep pulling back.'},
  {id:'ecr4',  text:"I find that my partner doesn't want to get as close as I would like."},
  {id:'ecr5',  text:'I turn to my partner for many things, including comfort and reassurance.'},
  {id:'ecr6',  text:'My desire to be very close sometimes scares people away.'},
  {id:'ecr7',  text:'I try to avoid getting too close to my partner.'},
  {id:'ecr8',  text:'I do not often worry about being abandoned.'},
  {id:'ecr9',  text:'I usually discuss my problems and concerns with my partner.'},

const R7 = x => 8 - x;                       // reverse a 1..7 item
const mean = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;
const clamp = (v,a,b)=> Math.max(a, Math.min(b,v));

function deriveBigFive(t){
  if (!t || t.tipi1==null) return null;
  return {
    E:  mean([t.tipi1, R7(t.tipi6)]),
    A:  mean([R7(t.tipi2), t.tipi7]),
    C:  mean([t.tipi3, R7(t.tipi8)]),
    ES: mean([R7(t.tipi4), t.tipi9]),
    O:  mean([t.tipi5, R7(t.tipi10)]),
  };
}
function deriveAttachment(e){
  if (!e || e.ecr1==null) return null;
  const avoidance = mean([R7(e.ecr1), e.ecr3, R7(e.ecr5), e.ecr7, R7(e.ecr9), e.ecr11]);
  const anxiety   = mean([e.ecr2, e.ecr4, e.ecr6, R7(e.ecr8), e.ecr10, e.ecr12]);
  const hiA = anxiety>=4, hiV = avoidance>=4;
  const style = hiA&&hiV ? 'fearful' : hiA ? 'anxious' : hiV ? 'dismissive' : 'secure';
  return { anxiety, avoidance, style };
}
function deriveGottman(g){
  if (!g || g.g_con1==null) return null;
  const norm = ids => (mean(ids.map(id=>g[id])) - 1) / 4;
  return {
    style: g.g_style || null,
    criticism:     norm(['g_cri1','g_cri2']),
    contempt:      norm(['g_con1','g_con2']),
    defensiveness: norm(['g_def1','g_def2']),
    stonewalling:  norm(['g_sto1','g_sto2']),
  };
}
function deriveAll(profile){
  profile.derived = profile.derived || {};
  const bf = deriveBigFive(profile.tipiRaw);
  const att = deriveAttachment(profile.ecrRaw);
  const g = deriveGottman(profile.gottmanRaw);
  if (bf) profile.derived.bigFive = bf;
  if (att) profile.derived.attachment = att;
  if (g) profile.derived.gottman = g;
  profile.derived.catScores = categoryScores(profile);
  return profile;
}

// Tier 1 — non-compensatory dealbreaker gate
function passesDealbreakers(self, cand){
  const failed = [];
  DEALBREAKERS.forEach(d => {
    if (self.nonNegotiable && self.nonNegotiable[d.id]){
      const u = self.dealbreakers[d.id], c = cand.dealbreakers ? cand.dealbreakers[d.id] : null;
      if (u!=null && c!=null && DB_COMPAT[d.id] && !DB_COMPAT[d.id](u,c)) failed.push(d.id);
    }
  });
  const g = cand.derived && cand.derived.gottman;
  if (g && g.contempt > CONTEMPT_GATE) failed.push('contempt');
  return { pass: failed.length===0, failed };
}

function emptyProfile(id, source){

// normalized 0..100 of a person's own answer on a reciprocal item
function normAnswer(item, val){ const mx=recipMax(item); return mx>1 ? Math.round((val-1)/(mx-1)*100) : 0; }

// legacy 6-axis category scores = mean of own normalized answers per category
function categoryScores(profile){
  const out={};
  RECIP_CATS.forEach(c=>{
    const vals = RECIP_BY_CAT[c.id].map(it => profile.responses[it.id]).filter(Boolean)
      .map(r=> r.answer).filter(v=>v!=null);
    const items = RECIP_BY_CAT[c.id];
    const norms = items.map(it=> profile.responses[it.id]&&profile.responses[it.id].answer!=null
      ? normAnswer(it, profile.responses[it.id].answer) : null).filter(v=>v!=null);
    out[c.id] = norms.length ? Math.round(mean(norms)) : 0;
  });
  return out;
}

// how well `cand` satisfies `self`'s preferences within one category (importance-weighted)
function categorySatisfaction(self, cand, catId){
  let earn=0, poss=0, plainHit=0, plainN=0;
  RECIP_BY_CAT[catId].forEach(it=>{
    const a=self.responses[it.id], b=cand.responses ? cand.responses[it.id] : null;
    if (!a || !b || a.answer==null || b.answer==null) return;
    const w = IMPORTANCE_WEIGHTS[a.importance]||0;
    const hit = (a.preferred||[]).includes(b.answer);
    plainN++; if (hit) plainHit++;
    if (w>0){ poss+=w; if (hit) earn+=w; }
  });
  if (poss>0) return Math.round(earn/poss*100);
  return plainN>0 ? Math.round(plainHit/plainN*100) : 0;
}

function personalityAxis(profile){
  const bf = profile.derived && profile.derived.bigFive; if (!bf) return null;
  return Math.round((mean([bf.A,bf.C,bf.ES,bf.O]) - 1)/6*100);
}
function attachmentSecurityAxis(profile){
  const att = profile.derived && profile.derived.attachment; if (!att) return null;
  const security = 7 - mean([att.anxiety, att.avoidance]);
  return Math.round((security-1)/6*100);
}
// self polygon across the 8 compass axes (own emphasis + own psychometrics)
function profileAxisScores(profile){
  const cs = categoryScores(profile); const out={};
  RECIP_CATS.forEach(c=> out[c.id]=cs[c.id]);
  out.personality = personalityAxis(profile) ?? 0;
  out.attachment = attachmentSecurityAxis(profile) ?? 0;
  return out;
}
// attachment pairing heuristic
const ATTACH_LABEL = {secure:'Secure', anxious:'Anxious-Preoccupied', dismissive:'Dismissive-Avoidant', fearful:'Fearful-Avoidant'};
function attachmentPairing(a, b){
  if (!a||!b) return null;
  const s=a.style, c=b.style;
  const has=(x,y)=> (s===x&&c===y)||(s===y&&c===x);
  if (s==='secure'&&c==='secure') return {rating:'Excellent', note:'Two secure partners — a stable, low-threat base.'};
  if (s==='secure'||c==='secure') return {rating:'Good', note:'A secure partner acts as an anchor, drawing the other toward earned security.'};
  if (has('anxious','dismissive')) return {rating:'Poor', note:'The classic anxious–avoidant "pursue-withdraw" trap — high instability risk.'};
  if (s==='anxious'&&c==='anxious') return {rating:'Fair', note:'Mutual reassurance, but watch for co-escalation under stress.'};
  if (s==='dismissive'&&c==='dismissive') return {rating:'Fair', note:'Low conflict, but intimacy and emotional disclosure may stay shallow.'};
  return {rating:'Poor', note:'At least one fearful-avoidant partner — expect volatility without deliberate work.'};
}

function isComplete(profile, moduleId){
  switch(moduleId){
    case 'tipi': return TIPI_ITEMS.every(i=> profile.tipiRaw[i.id]!=null);
    case 'ecr': return ECR_ITEMS.every(i=> profile.ecrRaw[i.id]!=null);
    case 'gottman': return GOTTMAN_ITEMS.every(i=> profile.gottmanRaw[i.id]!=null) && profile.gottmanRaw.g_style;
    default: return RECIP_BY_CAT[moduleId] ? RECIP_BY_CAT[moduleId].every(i=> profile.responses[i.id] && profile.responses[i.id].answer!=null) : true;
  }
}

const READ_MODULES = RECIP_CATS.map(c=>c.id);                                    // "your read on her" — reciprocal only
function flowModules(flow){ return flow && flow.kind==='read' ? READ_MODULES : FULL_MODULES; }

/* ---- IDEAL PARTNER: derived from the user's answers alone ---- */
const IDEAL_ATT_RATIONALE = {
  secure:'someone secure like you — steady, direct, and at ease with closeness, so the relationship stays a calm home base.',
  anxious:'someone secure, whose steady reassurance and consistency quiet the part of you that watches for distance.',
  dismissive:'someone secure who is comfortable with the independence you value and never reads space as rejection.',
  fearful:'someone secure and patient, who offers safety without pressure so closeness stops feeling risky.',
};
const STYLE_COORDS = { secure:{anxiety:2,avoidance:2}, anxious:{anxiety:5.5,avoidance:2}, dismissive:{anxiety:2,avoidance:5.5}, fearful:{anxiety:5.5,avoidance:5.5} };
const ARCH_ADJ = { values:'Devoted Partner', communication:'Open Communicator', affection:'Affectionate Companion', lifestyle:'Kindred Spirit', meaning:'Life Builder', finance:'Grounded Planner' };

function deriveIdealPartner(self){
  const cats={};
  RECIP_CATS.forEach(c=>{
    let lvlSum=0, wSum=0; const wants=[];
    RECIP_BY_CAT[c.id].forEach(it=>{
      const r=self.responses[it.id]; if(!r || !r.preferred || !r.preferred.length) return;
      const w=IMPORTANCE_WEIGHTS[r.importance]!=null ? Math.max(1, IMPORTANCE_WEIGHTS[r.importance]) : 1;
      lvlSum += Math.max(...r.preferred.map(v=>normAnswer(it,v))) * w; wSum += w;
      r.preferred.forEach(v=>{ const o=it.options.find(x=>x[0]===v); if(o && !wants.includes(o[1])) wants.push(o[1]); });
    });
    cats[c.id] = { score: wSum>0?Math.round(lvlSum/wSum):0, wants };
  });
  const myAtt = self.derived && self.derived.attachment;
  const attachment = { style:'secure', anxiety:2, avoidance:2, rationale: IDEAL_ATT_RATIONALE[myAtt?myAtt.style:'secure'] };
  const myBf = self.derived && self.derived.bigFive;
  const bigFive = { A:6.2, ES:6.2, C: myBf?Math.max(5, myBf.C):5.5, O: myBf?myBf.O:4.5, E: myBf?myBf.E:4.5 };
  const dealbreakers={}; DEALBREAKERS.forEach(d=>{ if(self.nonNegotiable && self.nonNegotiable[d.id]) dealbreakers[d.id]=self.dealbreakers[d.id]; });
  const topCat = RECIP_CATS.map(c=>({id:c.id,s:cats[c.id].score})).sort((a,b)=>b.s-a.s)[0];
  const archetype = 'The Secure ' + (ARCH_ADJ[topCat.id] || 'Companion');
  const axisScores={}; RECIP_CATS.forEach(c=> axisScores[c.id]=cats[c.id].score);
  axisScores.personality = Math.round((mean([bigFive.A,bigFive.C,bigFive.ES,bigFive.O])-1)/6*100);
  axisScores.attachment  = Math.round((7 - mean([attachment.anxiety,attachment.avoidance]) -1)/6*100);
  return { seek: seekOf(self), cats, attachment, bigFive, dealbreakers, archetype, axisScores };
}
// One-directional "fit to your ideal": how well her answers satisfy what you want (importance-weighted)
function fitToIdeal(self, her){
  let earn=0, poss=0, hit=0, n=0;
  RECIP_ITEMS.forEach(it=>{
    const a=self.responses[it.id], b=her.responses ? her.responses[it.id] : null;
    if(!a || !b || a.answer==null || b.answer==null) return;
    const w=IMPORTANCE_WEIGHTS[a.importance]||0; const ok=(a.preferred||[]).includes(b.answer);
    n++; if(ok) hit++; if(w>0){ poss+=w; if(ok) earn+=w; }
  });
  if(poss>0) return Math.round(earn/poss*100);
  return n>0?Math.round(hit/n*100):0;
}

function buildRadarSVG(axes, datasets, size){
  size = size||340;
  const cx=size/2, cy=size/2, R=size*0.34, labelR=R+size*0.085, N=axes.length;
  const angleFor = i => (-90 + i*(360/N))*Math.PI/180;
  let svg = `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" role="img" aria-label="Compatibility compass chart">`;
  [20,40,60,80,100].forEach(pct=>{
    const pts = axes.map((a,i)=>{const ang=angleFor(i),r=R*(pct/100); return (cx+r*Math.cos(ang)).toFixed(1)+','+(cy+r*Math.sin(ang)).toFixed(1);}).join(' ');
    svg += `<polygon points="${pts}" fill="none" stroke="rgba(201,163,92,0.16)" stroke-width="1"/>`;
  });
  axes.forEach((a,i)=>{
    const ang=angleFor(i), x2=cx+R*Math.cos(ang), y2=cy+R*Math.sin(ang);
    svg += `<line x1="${cx}" y1="${cy}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="rgba(201,163,92,0.16)" stroke-width="1"/>`;
    const lx=cx+labelR*Math.cos(ang), ly=cy+labelR*Math.sin(ang);
    let anchor='middle'; if(Math.cos(ang)>0.3)anchor='start'; else if(Math.cos(ang)<-0.3)anchor='end';
    svg += `<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="${anchor}" dominant-baseline="middle" font-family="ui-monospace,Menlo,monospace" font-size="${(size*0.028).toFixed(1)}" fill="#8B93A1" letter-spacing="0.04em">${a.short.toUpperCase()}</text>`;
  });
  datasets.forEach(ds=>{
    const pts=axes.map((a,i)=>{const ang=angleFor(i),v=ds.values[a.id]||0,r=R*(v/100); return [cx+r*Math.cos(ang),cy+r*Math.sin(ang)];});
    const pstr=pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
    const dash=ds.dashed?`stroke-dasharray="5,4"`:'';
    svg += `<polygon points="${pstr}" fill="${ds.color}" fill-opacity="0.14" stroke="${ds.color}" stroke-width="2" ${dash}/>`;
    pts.forEach(p=> svg+=`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="${ds.color}"/>`);
  });
  svg += `<circle cx="${cx}" cy="${cy}" r="2" fill="#C9A35C"/></svg>`;
  return svg;
}

// Attachment quadrant: X = avoidance (0..7), Y = anxiety (0..7)
function buildAttachmentQuadrant(points, size){
  size=size||320; const pad=38, W=size-pad*2, H=size-pad*2, x0=pad, y0=pad;
  const sx=v=> x0 + (v/7)*W;               // avoidance L→R
  const sy=v=> y0 + (1-(v/7))*H;           // anxiety bottom→top
  const mid=3.5;
  let svg=`<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" role="img" aria-label="Attachment style quadrant">`;
  svg+=`<rect x="${x0}" y="${y0}" width="${W}" height="${H}" fill="none" stroke="rgba(201,163,92,0.25)"/>`;
  svg+=`<line x1="${sx(mid)}" y1="${y0}" x2="${sx(mid)}" y2="${y0+H}" stroke="rgba(201,163,92,0.16)"/>`;
  svg+=`<line x1="${x0}" y1="${sy(mid)}" x2="${x0+W}" y2="${sy(mid)}" stroke="rgba(201,163,92,0.16)"/>`;
  const q=[['SECURE',x0+W*0.02,y0+H*0.97],['ANXIOUS',x0+W*0.02,y0+H*0.06],['DISMISSIVE',x0+W*0.72,y0+H*0.97],['FEARFUL',x0+W*0.72,y0+H*0.06]];
  q.forEach(([t,x,y])=> svg+=`<text x="${x.toFixed(0)}" y="${y.toFixed(0)}" font-family="ui-monospace,Menlo,monospace" font-size="${(size*0.032).toFixed(1)}" fill="#8B93A1" letter-spacing="0.05em">${t}</text>`);
  svg+=`<text x="${x0+W/2}" y="${size-6}" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="10" fill="#8B93A1">AVOIDANCE →</text>`;
  svg+=`<text x="10" y="${y0+H/2}" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="10" fill="#8B93A1" transform="rotate(-90 10 ${y0+H/2})">ANXIETY →</text>`;
  points.forEach(p=>{ if(!p.att) return; const cx=sx(p.att.avoidance), cy=sy(p.att.anxiety);
    svg+=`<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="5" fill="${p.color}"/>`;
    svg+=`<text x="${(cx+9).toFixed(1)}" y="${(cy+3).toFixed(1)}" font-family="ui-sans-serif" font-size="11" fill="${p.color}">${escapeHtml(p.label)}</text>`; });
  svg+=`</svg>`; return svg;
}

function buildSparkline(values, w, h){
  w=w||220; h=h||40; if(!values.length) return '';
  const max=7, min=1; const step = values.length>1 ? w/(values.length-1) : 0;
  const pts=values.map((v,i)=> `${(i*step).toFixed(1)},${(h-((v-min)/(max-min))*h).toFixed(1)}`).join(' ');
  return `<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}"><polyline points="${pts}" fill="none" stroke="#5FA8A0" stroke-width="2"/>${values.map((v,i)=>`<circle cx="${(i*step).toFixed(1)}" cy="${(h-((v-min)/(max-min))*h).toFixed(1)}" r="2.5" fill="#5FA8A0"/>`).join('')}</svg>`;
}

const PBKDF2_ITERS = 600000;
const enc = new TextEncoder(), dec = new TextDecoder();
const hasCrypto = typeof crypto!=='undefined' && crypto.subtle;
function b64(buf){ return btoa(String.fromCharCode(...new Uint8Array(buf))); }
function unb64(str){ return Uint8Array.from(atob(str), c=>c.charCodeAt(0)); }

async function deriveKey(passphrase, salt){
  const base = await crypto.subtle.importKey('raw', enc.encode(passphrase), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt, iterations:PBKDF2_ITERS, hash:'SHA-256' },
    base, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']);
}
async function encryptJSON(obj, key){
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({name:'AES-GCM', iv}, key, enc.encode(JSON.stringify(obj)));
  return { enc:true, alg:'AES-GCM', kdf:'PBKDF2', iters:PBKDF2_ITERS, iv:b64(iv), ct:b64(ct) };
}
async function decryptJSON(env, key){
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:unb64(env.iv)}, key, unb64(env.ct));
  return JSON.parse(dec.decode(pt));
}

const DB_NAME='partnerBlueprint', DB_STORE='kv';
function openDB(){
  return new Promise((res,rej)=>{
    if (!window.indexedDB) return res(null);
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => { const db=req.result; if(!db.objectStoreNames.contains(DB_STORE)) db.createObjectStore(DB_STORE, {keyPath:'k'}); };
    req.onsuccess = () => res(req.result);
    req.onerror = () => res(null);
  });
}
function dbGet(db,k){ return new Promise(r=>{ if(!db)return r(null); const t=db.transaction(DB_STORE,'readonly').objectStore(DB_STORE).get(k); t.onsuccess=()=>r(t.result?t.result.value:null); t.onerror=()=>r(null); }); }
function dbPut(db,k,value){ return new Promise(r=>{ if(!db)return r(); const t=db.transaction(DB_STORE,'readwrite').objectStore(DB_STORE).put({k,value}); t.onsuccess=()=>r(); t.onerror=()=>r(); }); }

async function persist(){
  if (!state.db) return;
  await dbPut(state.db, 'meta', { encEnabled:state.encEnabled, salt: state.saltB64 });
  const data = { schemaVersion:SCHEMA_VERSION, self:state.self, candidates:state.candidates };
  if (state.encEnabled){
    // Never downgrade to plaintext: if the store is locked (no key), skip the data write.
    if (!state.cryptoKey){ console.warn('persist skipped: encrypted store is locked'); return; }
    await dbPut(state.db, 'data', await encryptJSON(data, state.cryptoKey));
  } else {
    await dbPut(state.db, 'data', data);
  }
}
function markUpdated(p){ if(p) p.updatedAt = nowISO(); }
async function save(){ deriveAll(state.self); markUpdated(state.self); try{ await persist(); }catch(e){ console.warn('persist failed', e); } }

/* ---- module quiz (shared by the self flow and the "your read on her" flow) ---- */
function renderModule(){
  const f = state.flow, p = f.profile;
  const mods = flowModules(f);
  const isSelf = f.kind==='self';
  const modId = mods[f.moduleIndex];
  const railHtml = mods.map((m,i)=>{
    const pct = isComplete(p,m)?100:(i===f.moduleIndex?40:0);
    const color = i===f.moduleIndex?'var(--teal)':'var(--gold)';
    return `<div class="seg"><i style="width:${pct}%; background:${color}"></i></div>`;
  }).join('');
  let body, title;
  if (RECIP_BY_CAT[modId]){ title=RECIP_CATS.find(c=>c.id===modId).label; body=renderRecipModule(modId, p, isSelf); }
  else if (modId==='tipi'){ title='Personality (Big Five)'; body=renderLikertModule(TIPI_ITEMS, p.tipiRaw, 'tipi', 7, 'Disagree strongly','Agree strongly','I see myself as…'); }
  else if (modId==='ecr'){ title='Attachment'; body=renderLikertModule(ECR_ITEMS, p.ecrRaw, 'ecr', 7, 'Disagree strongly','Agree strongly','How true is each statement for you?'); }
  else if (modId==='gottman'){ title='Conflict style'; body=renderGottmanModule(p); }
  const who = isSelf ? 'Your blueprint' : (escapeHtml(p.name||'This person'));
  const last = f.moduleIndex===mods.length-1;
  const nextLabel = last ? (isSelf ? 'Continue to non-negotiables' : 'Continue') : 'Next module';
  const content = `
    <div class="rail-label">${who} — module ${f.moduleIndex+1} of ${mods.length}: ${title}</div>
    <div class="rail">${railHtml}</div>
    <div class="panel">
      ${body}
      <div class="btn-row">
        <button class="btn ghost" data-action="mod-back">← Back</button>
        <button class="btn primary" data-action="mod-next" ${isComplete(p,modId)?'':'disabled'}>${nextLabel}</button>
      </div>
      ${!isComplete(p,modId)?'<p class="hint" style="margin-top:12px;">Answer every item to continue.</p>':''}
    </div>`;
  appEl.innerHTML = shell(content, isSelf?'Building your blueprint':'Your read on '+escapeHtml(p.name||'them'));
}

function renderRecipModule(catId, p, isSelf){
  const items = RECIP_BY_CAT[catId];
  const seek = seekOf(state.self);
  if (!isSelf){
    // "Your read on her" — only her own answer per item, no preferences/importance.
    return `<p class="section-desc">Your best read on ${escapeHtml(p.name||seek.subj)} — how would ${seek.subj} answer each? (Skip nothing; estimate if unsure.)</p>` +
      items.map(it=>{
        const r = p.responses[it.id] || {answer:null};
        const ans = it.options.map(([v,l])=>`<button data-action="recip-answer" data-id="${it.id}" data-v="${v}" class="${r.answer===v?'sel':''}">${escapeHtml(l)}</button>`).join('');
        return `<div class="item"><p class="q-text">${escapeHtml(it.text)}</p>
          <div class="sub-label">${escapeHtml((p.name||seek.subjCap))}'s answer</div><div class="opts">${ans}</div></div>`;
      }).join('');
  }
  const lookIn = seek.noun==='woman' ? 'her' : seek.noun==='man' ? 'him' : 'a partner';
  return `<p class="section-desc">For each: where <em>you</em> stand, what you're looking for in ${lookIn} (defaults to matching you — adjust if you want something different), and how much it matters.</p>` +
    items.map(it=>{
      const r = p.responses[it.id] || {answer:null, preferred:[], importance:'somewhat'};
      const ans = it.options.map(([v,l])=>`<button data-action="recip-answer" data-id="${it.id}" data-v="${v}" class="${r.answer===v?'sel':''}">${escapeHtml(l)}</button>`).join('');
      const acc = it.options.map(([v,l])=>`<button data-action="recip-pref" data-id="${it.id}" data-v="${v}" class="${(r.preferred||[]).includes(v)?'sel':''}">${escapeHtml(l)}</button>`).join('');
      const imp = IMPORTANCE_ORDER.map(k=>`<button data-action="recip-imp" data-id="${it.id}" data-k="${k}" class="${r.importance===k?'sel':''}">${IMPORTANCE_LABEL[k]}</button>`).join('');
      return `<div class="item">
        <p class="q-text">${escapeHtml(it.text)}</p>
        <div class="sub-label">You</div><div class="opts">${ans}</div>
        <div class="sub-label">In ${lookIn}, you're looking for</div><div class="opts accept">${acc}</div>
        <div class="sub-label">How much this matters</div><div class="imp">${imp}</div>
      </div>`;
    }).join('');
}
function renderLikertModule(items, raw, prefix, scale, lo, hi, desc){
  const dots=(id,val)=> `<div class="likert">`+Array.from({length:scale},(_,i)=>i+1).map(v=>`<button data-action="likert" data-store="${prefix}" data-id="${id}" data-v="${v}" class="${val===v?'sel':''}">${v}</button>`).join('')+`</div>`;
  return `<p class="section-desc">${escapeHtml(desc)}</p>`+
    items.map(it=>`<div class="likert-row"><div class="lk-text">${escapeHtml(it.text)}</div>${dots(it.id, raw[it.id])}</div>`).join('') +
    `<div class="likert-ends"><span>1 · ${lo}</span><span>${scale} · ${hi}</span></div>`;
}
function renderGottmanModule(p){
  const g=p.gottmanRaw;
  const styleOpts = GOTTMAN_STYLE.options.map(([v,l])=>`<button data-action="gstyle" data-v="${v}" class="${g.g_style===v?'sel':''}" style="text-align:left; flex:1 1 100%;">${escapeHtml(l)}</button>`).join('');
  const dots=(id,val)=> `<div class="likert">`+[1,2,3,4,5].map(v=>`<button data-action="likert" data-store="gottman" data-id="${id}" data-v="${v}" class="${val===v?'sel':''}">${v}</button>`).join('')+`</div>`;
  return `<p class="section-desc">${escapeHtml(GOTTMAN_STYLE.text)}</p><div class="opts" style="margin-bottom:8px;">${styleOpts}</div>
    <div class="sub-label">During disagreements, how often is each true? (1 Never → 5 Very often)</div>`+
    GOTTMAN_ITEMS.map(it=>`<div class="likert-row"><div class="lk-text">${escapeHtml(it.text)}</div>${dots(it.id, g[it.id])}</div>`).join('');
}

function generateIdealText(self, ideal){
  const seek = ideal.seek;
  const ranked = RECIP_CATS.map(c=>({c, s:ideal.cats[c.id].score})).sort((a,b)=>b.s-a.s);
  const top=ranked[0].c, second=ranked[1].c;
  const topWants = ideal.cats[top.id].wants.slice(0,2);
  let p1 = `The ideal ${seek.noun} for you leans most into <strong>${top.label.toLowerCase()}</strong> and <strong>${second.label.toLowerCase()}</strong>`;
  p1 += topWants.length ? ` — someone who reads as "${topWants.map(w=>escapeHtml(w.toLowerCase())).join('" and "')}".` : '.';
  let p2 = `In how ${seek.subj} connect${seek.subj==='they'?'':'s'} and handle${seek.subj==='they'?'':'s'} conflict, ${seek.subj} ${seek.subj==='they'?'are':'is'} ${ideal.attachment.rationale}`;
  let p3 = `Temperamentally, what matters most is <strong>warmth</strong> and <strong>emotional steadiness</strong> — ${seek.subj} ${seek.subj==='they'?'are':'is'} agreeable and calm under stress, and share${seek.subj==='they'?'':'s'} your level of openness and social energy. (This describes who ${seek.subj} ${seek.subj==='they'?'are':'is'}, not how ${seek.subj} look${seek.subj==='they'?'':'s'}.)`;
  return [p1,p2,p3].map(x=>`<p>${x}</p>`).join('');
}

function renderCandidateList(){
  const self = state.self;
  const seek = seekOf(self);
  if (!state.candidates.length){
    return `<div class="empty-state" style="padding:20px;"><p>No one added yet.</p></div>
      <div class="btn-row" style="justify-content:center;"><button class="btn primary" data-action="add-candidate">+ Size up someone</button></div>`;
  }
  const gated = state.candidates.map(c=>({c, gate:passesDealbreakers(self, c)}));
  const surv = gated.filter(x=>x.gate.pass).map(x=>x.c).sort((a,b)=> fitToIdeal(self,b)-fitToIdeal(self,a));
  const excluded = gated.filter(x=>!x.gate.pass);
  const rankRows = surv.map((c,i)=>`<div class="rank-row" data-action="view-candidate" data-id="${c.id}" style="cursor:pointer;">
      <span class="pos">${i+1}.</span><span class="name">${escapeHtml(c.name||'Someone')}</span><span class="score">${fitToIdeal(self,c)}%</span></div>`).join('');
  const exclRows = excluded.map(x=>`<div class="rank-row excluded" data-action="view-candidate" data-id="${x.c.id}" style="cursor:pointer;">
      <span class="pos">✕</span><span class="name">${escapeHtml(x.c.name||'Someone')} <span class="tag rust">${x.gate.failed.map(f=>DB_LABEL[f]||f).join(', ')}</span></span><span class="score" style="color:var(--rust)">excluded</span></div>`).join('');
  return `${surv.length?`<div class="sub-label">Ranked by fit to your ideal</div><div class="rank-list">${rankRows}</div>`:''}
    ${excluded.length?`<div class="sub-label" style="margin-top:18px; color:var(--rust);">Excluded by non-negotiables</div><div class="rank-list">${exclRows}</div>`:''}
    <div class="btn-row"><button class="btn ghost" data-action="add-candidate">+ Size up someone</button>${surv.length>=2?'<button class="btn ghost" data-action="compare-all">Compare compass</button>':''}</div>`;
}

/* =============================== [EXPORT] ============================= */

function download(obj, filename){
  const blob=new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=filename; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}
function appData(){ return { format:'partner-blueprint', schemaVersion:SCHEMA_VERSION, exportedAt:nowISO(), self:state.self, candidates:state.candidates }; }

async function exportJSON(encrypted){
  let payload = appData();
  if (encrypted){
    if (!hasCrypto){ alert('Encryption unavailable in this browser.'); return; }
    const pass = prompt('Passphrase to encrypt this export:'); if(!pass) return;
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const key = await deriveKey(pass, salt);
    const env = await encryptJSON(payload, key); env.format='partner-blueprint'; env.salt=b64(salt);
    payload = env;
  }
  download(payload, encrypted?'partner-blueprint.enc.json':'partner-blueprint.json');
}

function migrateV1toV2(data){
  const p = emptyProfile('self','self');
  const ans = data.answers||{};
  // v1 used a single 1..5 importance answer per item; seed it as answer + homophily preference.
  Object.keys(ans).forEach(qid=>{ p.responses[qid] = {answer:ans[qid], preferred:[ans[qid]], importance:'somewhat'}; });
  p.dealbreakerOther = data.dealbreakerOther||'';
  state.self = p;
  state.candidates = [];   // old subjective candidate ratings don't map to the new model
  state.toast = 'Imported an older blueprint. Re-answer the modules to complete your ideal profile.';
}

function loadAppData(data){
  state.self = data.self || emptyProfile('self','self');
  state.candidates = data.candidates || [];
  deriveAll(state.self); state.candidates.forEach(c=> deriveAll(c));
}

async function handleImport(text){
  let obj; try{ obj=JSON.parse(text); }catch(e){ alert('That file is not valid JSON.'); return; }
  // encrypted envelope?
  if (obj && obj.enc && obj.ct){
    if(!hasCrypto){ alert('Encrypted file, but Web Crypto is unavailable here.'); return; }
    const pass = prompt('Passphrase to decrypt this file:'); if(!pass) return;
    try{ const salt=unb64(obj.salt); const key=await deriveKey(pass,salt); obj = await decryptJSON(obj,key); }
    catch(e){ alert('Incorrect passphrase or corrupted file.'); return; }
  }
  if (obj.schemaVersion===2 || obj.self){ loadAppData(obj); }
  else if (obj.version===1 || obj.answers){ migrateV1toV2(obj); }
  else { alert('Unrecognized file.'); return; }
  // Recovery via the locked screen's "import a backup instead": we have no key, so
  // turn encryption off (the imported backup is now the plaintext source) rather than
  // silently skip persistence. The user can re-enable encryption afterward.
  if (state.encEnabled && !state.cryptoKey){
    state.encEnabled=false; state.saltB64=null; state.locked=false;
    state.toast='Recovered from backup — encryption is now off. Re-enable it in Privacy & data.';
  }
  await save();
  setView(profileHasAnyData(state.self)?'profile':'intro');
}

/* =============================== [EVENTS] ============================= */

function startSelfFlow(){
  const idx = FULL_MODULES.findIndex(m=> !isComplete(state.self,m));
  state.flow = { kind:'self', profile:state.self, moduleIndex: idx===-1?0:idx, returnView:'profile' };
  setView('module');
}
function advanceModule(dir){
  const f=state.flow;
  const mods = flowModules(f);
  if (dir<0){
    if (f.moduleIndex===0){ setView(f.kind==='self'?'intro':'candName'); return; }
    f.moduleIndex--; setView('module'); return;
  }
  if (f.moduleIndex===mods.length-1){ setView(f.kind==='read' ? 'candAttach' : 'dealbreakers'); return; }
  f.moduleIndex++; setView('module');
}

appEl.addEventListener('click', async e=>{
  const t=e.target.closest('[data-action]'); if(!t) return;
  const a=t.dataset.action;
  switch(a){
    case 'start-self': if(!state.self.seeking){ setView('seeking'); } else { startSelfFlow(); } break;
    case 'set-seeking': { const prev=state.view; state.self.seeking=t.dataset.v; await save(); if(prev==='settings') setView('settings'); else startSelfFlow(); break; }
    case 'retake': if(confirm('Clear your blueprint and start over? People you\'ve sized up are kept.')){ const seeking=state.self.seeking; state.self=emptyProfile('self','self'); state.self.seeking=seeking; await save(); startSelfFlow(); } break;
    case 'settings': setView('settings'); break;
    case 'back-to-profile': state.flow=null; setView('profile'); break;

    // module quiz
    case 'recip-answer': { const r=ensureResp(t.dataset.id); r.answer=parseInt(t.dataset.v,10); if(!r.preferred||!r.preferred.length) r.preferred=[r.answer]; touch(); break; }
    case 'recip-pref': { const r=ensureResp(t.dataset.id); const v=parseInt(t.dataset.v,10); r.preferred=r.preferred||[]; const i=r.preferred.indexOf(v); if(i<0)r.preferred.push(v); else r.preferred.splice(i,1); touch(); break; }
    case 'recip-imp': { const r=ensureResp(t.dataset.id); r.importance=t.dataset.k; touch(); break; }
    case 'likert': { const store=t.dataset.store; const p=state.flow.profile; const raw=store==='tipi'?p.tipiRaw:store==='ecr'?p.ecrRaw:p.gottmanRaw; raw[t.dataset.id]=parseInt(t.dataset.v,10); touch(); break; }
    case 'gstyle': { state.flow.profile.gottmanRaw.g_style=t.dataset.v; touch(); break; }
    case 'mod-back': advanceModule(-1); break;
    case 'mod-next': advanceModule(1); break;

    // dealbreakers
    case 'db-answer': { state.flow.profile.dealbreakers[t.dataset.id]=t.dataset.v; touch(); break; }
    case 'db-nn': { const id=t.dataset.id; state.flow.profile.nonNegotiable[id]=t.checked; break; }
    case 'db-back': state.flow.moduleIndex=flowModules(state.flow).length-1; setView(state.flow.kind==='read'?'candAttach':'module'); break;
    case 'db-done': await finishFlow(); break;

    // size up someone (you answer about them)
    case 'add-candidate': state.flow={kind:'read', profile:emptyProfile(nextId(),'read'), moduleIndex:0, returnView:'profile'}; setView('candName'); break;
    case 'cand-name-next': setView('module'); break;
    case 'set-cand-attach': { state.flow.profile.attachmentStyle=t.dataset.v; touch(); break; }
    case 'cand-attach-back': state.flow.moduleIndex=flowModules(state.flow).length-1; setView('module'); break;
    case 'cand-attach-next': setView('dealbreakers'); break;
    case 'view-candidate': state.lastCandidateId=t.dataset.id; state.flow=null; setView('candResult'); break;
    case 'delete-candidate': if(confirm('Delete this person?')){ state.candidates=state.candidates.filter(c=>c.id!==t.dataset.id); await save(); setView('profile'); } break;
    case 'compare-all': setView('compare'); break;

    // checkups
    case 'add-checkup': state.checkupFor=t.dataset.id; state.checkupDraft={}; setView('checkup'); break;
    case 'checkup-save': { const c=state.candidates.find(x=>x.id===state.checkupFor); if(c){ c.checkups=c.checkups||[]; c.checkups.push({at:nowISO(), ...defaultsCheckup(state.checkupDraft)}); await save(); state.lastCandidateId=c.id; setView('candResult'); } break; }

    // crypto/settings
    case 'enable-enc': await enableEncryption(); break;
    case 'disable-enc': await disableEncryption(); break;
    case 'unlock': await tryUnlock(); break;
    case 'export-json': await exportJSON(false); break;
    case 'export-json-enc': await exportJSON(true); break;
    case 'import-json': document.getElementById('importFile').click(); break;
    default: break;
  }
});

function ensureResp(id){ const p=state.flow.profile; if(!p.responses[id]) p.responses[id]={answer:null,preferred:[],importance:'somewhat'}; return p.responses[id]; }
let _saveTimer=null;
function scheduleSave(){ if(!state.db) return; clearTimeout(_saveTimer); _saveTimer=setTimeout(()=>{ save(); }, 400); }
function touch(){ render(); scheduleSave(); }
function defaultsCheckup(d){ const o={}; CHECKUP_ITEMS.forEach(it=> o[it.id]= d&&d[it.id]!=null?d[it.id]:4); return o; }

async function finishFlow(){
  const f=state.flow;
  if (f.kind==='self'){ deriveAll(state.self); await save(); state.flow=null; setView('profile'); }
  else if (f.kind==='read'){ state.candidates.push(f.profile); state.lastCandidateId=f.profile.id; state.flow=null; await save(); setView('candResult'); }
}

async function enableEncryption(){
  const p1=document.getElementById('pass1').value, p2=document.getElementById('pass2').value;
  if (!p1 || p1.length<6){ alert('Choose a passphrase of at least 6 characters.'); return; }
  if (p1!==p2){ alert('Passphrases do not match.'); return; }
  const salt=crypto.getRandomValues(new Uint8Array(16));
  state.cryptoKey = await deriveKey(p1, salt);
  state.saltB64 = b64(salt); state.encEnabled=true;
  await save(); state.toast='Encryption enabled.'; setView('profile');
}
async function disableEncryption(){
  if(!confirm('Turn off encryption? Your local data will be stored unencrypted.')) return;
  state.encEnabled=false; state.cryptoKey=null; state.saltB64=null; await save(); state.toast='Encryption disabled.'; setView('settings');
}
async function tryUnlock(){
  const pass=document.getElementById('unlockPass').value; if(!pass) return;
  try{
    const salt=unb64(state.saltB64); const key=await deriveKey(pass,salt);
    const rec = await dbGet(state.db,'data');
    const data = await decryptJSON(rec, key);
    state.cryptoKey=key; loadAppData(data); state.locked=false;
    setView(profileHasAnyData(state.self)?'profile':'intro');
  }catch(e){ renderUnlock(true); }
}

document.getElementById('importFile').addEventListener('change', e=>{
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader(); reader.onload=ev=> handleImport(ev.target.result); reader.readAsText(file); e.target.value='';
});

async function boot(){
  if (location.hash==='#selftest'){ return runSelfTests(); }
  state.db = await openDB();
  const meta = await dbGet(state.db,'meta');
  if (meta && meta.encEnabled){
    state.encEnabled=true; state.saltB64=meta.salt; state.locked=true; setView('unlock'); return;
  }
  const rec = await dbGet(state.db,'data');
  if (rec && !rec.enc){ loadAppData(rec); }
  setView(profileHasAnyData(state.self)?'profile':'intro');
}

/* --- in-browser assertion harness (visit #selftest) --- */
function runSelfTests(){
  const out=[]; let pass=0,fail=0;
  const ok=(n,c)=>{ if(c){pass++;out.push('✓ '+n);} else {fail++;out.push('✗ '+n);} };
  const near=(a,b,e=0.01)=>Math.abs(a-b)<=e;
  const tAll={}; for(let i=1;i<=10;i++)tAll['tipi'+i]=7;
  ok('TIPI all-7 → traits ~4', (()=>{const b=deriveBigFive(tAll);return near(b.E,4)&&near(b.A,4)&&near(b.C,4)&&near(b.ES,4)&&near(b.O,4);})());
  ok('ECR secure classification', deriveAttachment({ecr1:7,ecr3:1,ecr5:7,ecr7:1,ecr9:7,ecr11:1,ecr2:1,ecr4:1,ecr6:1,ecr8:7,ecr10:1,ecr12:1}).style==='secure');
  ok('ECR fearful classification', deriveAttachment({ecr1:1,ecr3:7,ecr5:1,ecr7:7,ecr9:1,ecr11:7,ecr2:7,ecr4:7,ecr6:7,ecr8:1,ecr10:7,ecr12:7}).style==='fearful');
  ok('Gottman contempt=1', near(deriveGottman({g_cri1:1,g_cri2:1,g_con1:5,g_con2:5,g_def1:1,g_def2:1,g_sto1:1,g_sto2:1}).contempt,1));
  const self={dealbreakers:{childbearing:'yes'},nonNegotiable:{childbearing:true}};
  ok('gate excludes conflicting childbearing', !passesDealbreakers(self,{dealbreakers:{childbearing:'no'},derived:{}}).pass);
  ok('gate passes open childbearing', passesDealbreakers(self,{dealbreakers:{childbearing:'open'},derived:{}}).pass);
  // ideal-partner derivation
  const me = emptyProfile('self','self'); me.seeking='woman';
  RECIP_ITEMS.forEach(it=>{ me.responses[it.id]={answer:it.options[0][0], preferred:[it.options[0][0]], importance:'very'}; });
  me.tipiRaw={tipi1:6,tipi2:2,tipi3:6,tipi4:6,tipi5:5,tipi6:3,tipi7:6,tipi8:2,tipi9:3,tipi10:3};
  me.ecrRaw={ecr1:2,ecr3:6,ecr5:2,ecr7:6,ecr9:2,ecr11:6,ecr2:6,ecr4:6,ecr6:6,ecr8:2,ecr10:6,ecr12:6}; // anxious-ish
  deriveAll(me); const idl=deriveIdealPartner(me);
  ok('ideal attachment is secure', idl.attachment.style==='secure');
  ok('ideal attachment rationale non-empty', !!idl.attachment.rationale && idl.attachment.rationale.length>10);
  ok('ideal warmth & stability are high (>=6)', idl.bigFive.A>=6 && idl.bigFive.ES>=6);
  ok('ideal archetype non-empty', typeof idl.archetype==='string' && idl.archetype.length>0);
  ok('ideal reflects preferences (wants populated)', RECIP_CATS.some(c=> idl.cats[c.id].wants.length>0));
  // fit: perfect match to own preferences = 100
  ok('fitToIdeal = 100 for a perfect read', fitToIdeal(me, me)===100);
  appEl.innerHTML = shell(`<div class="panel"><p class="eyebrow">Self-test</p><h2 class="section-title">${pass} passed, ${fail} failed</h2><pre style="font-family:var(--font-mono);font-size:0.8rem;line-height:1.8;color:${fail?'#e7a59c':'#5FA8A0'}">${out.join('\n')}</pre></div>`, 'Self-test');
}

window.addEventListener('hashchange', ()=>{ if(location.hash==='#selftest') location.reload(); });
boot();
</script>
